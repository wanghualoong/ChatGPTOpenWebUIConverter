name: Build Windows MSI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'gui_app.py'
      - 'migrator.py'
      - 'setup_windows.py'
      - 'requirements-build.txt'
      - '.github/workflows/build-windows-msi.yml'
  pull_request:
    paths:
      - 'gui_app.py'
      - 'migrator.py'
      - 'setup_windows.py'
      - 'requirements-build.txt'
      - '.github/workflows/build-windows-msi.yml'

jobs:
  build-windows-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build MSI
        shell: pwsh
        run: |
          python setup_windows.py bdist_msi

      - name: Verify MSI exists
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist -Filter *.msi -ErrorAction SilentlyContinue
          if (-not $msi) {
            Write-Error "No MSI produced under dist/."
            exit 1
          }
          $msi | ForEach-Object { Write-Host "MSI:" $_.FullName }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/*.msi
          if-no-files-found: error
